<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felipe Augustos — Field Notes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        try {
          var storedLocale = localStorage.getItem('locale');
          var locale = storedLocale === 'pt' || storedLocale === 'en'
            ? storedLocale
            : (navigator.language.toLowerCase().startsWith('pt') ? 'pt' : 'en');
          document.documentElement.lang = locale === 'pt' ? 'pt-BR' : 'en-US';

          var stored = localStorage.getItem('theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : (systemDark ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div class="mx-auto max-w-295 px-14 pb-24 max-tablet:px-6 max-tablet:pb-16">
      <div id="topbar"></div>
      <div id="app"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
